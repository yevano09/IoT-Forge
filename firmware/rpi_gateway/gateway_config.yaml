gateway:
  id: "rpi-gw-001"
  org_id: "demo"
  site_id: "blr-demo"

local_broker:
  host: "localhost"
  port: 1883

# Set enabled: true and fill host/credentials to bridge to cloud MQTT
upstream_broker:
  enabled: false
  host: "YOUR_CLOUD_BROKER_HOST"
  port: 8883
  username: ""
  password: ""

buffer_size: 10000        # max in-memory messages when upstream is offline
stats_interval_s: 30      # how often to log stats
api_port: 8080            # port for /health and /devices HTTP endpoints
